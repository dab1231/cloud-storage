services:

  db:
    image: postgres:16
    restart: always
    shm_size: 128mb
    volumes:
      - myapp:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: postgres
      POSTGRES_DB: cloud_storage


  adminer:
    image: adminer
    restart: always
    ports:
      - "8081:8080"

  minio:
    image: minio/minio:latest
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data


  redis:
    image: redis:7
    restart: always
    ports:
      - "6379:6379"

volumes:
  myapp:
  minio_data:

