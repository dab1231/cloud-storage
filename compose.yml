services:

  db:
    image: postgres:16
    restart: always
    shm_size: 128mb
    volumes:
      - myapp:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: postgres
      POSTGRES_DB: cloud_storage


  adminer:
    image: adminer
    restart: always
    ports:
      - "8081:8080"
volumes:
  myapp: